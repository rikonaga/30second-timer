<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>60秒片付けよう</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#faf7f0;
    flex-direction:column;
}

#time{
    font-size:80px;
    font-weight:bold;
}

    #plant{

    font-size:80px;

    margin:20px;

}
    
</style>

</head>

<body>

<h1>60秒片付けよう</h1>

<div id="plant">🌱</div> 

<div id="time">60</div>

<script>

let count = 60;

 setTimeout(function(){

    document.getElementById("plant").textContent = "🌿";

},30000);

setTimeout(function(){

    document.getElementById("plant").textContent = "🌳";

},60000); 

const timer = setInterval(function(){

    count--;

    document.getElementById("time").textContent = count;

    if(count <= 0){

        clearInterval(timer);

        document.getElementById("time").textContent="リセット完了！";

    }

},1000);

</script>

</body>
</html>
