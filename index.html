<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>60秒片付けよう</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:linear-gradient(180deg,#FAF7F0,#F3E7D2);
    flex-direction:column;

    transition:background 2s linear;
}

#time{
    font-size:80px;
    font-weight:bold;
}

    #plant{

    font-size:80px;

    margin:20px;

}
    
</style>

</head>

<body>

<h1>60秒片付けよう</h1>

<div id="plant">🌱</div> 

<div id="time">60</div>

<script>

let count = 60;

const colors = [

"linear-gradient(180deg,#FAF7F0,#F3E7D2)",

"linear-gradient(180deg,#F8F2DF,#EADFBF)",

"linear-gradient(180deg,#EEF0D9,#DCE7BF)",

"linear-gradient(180deg,#DDEBC8,#C5DFAB)",

"linear-gradient(180deg,#C5E2B0,#A7D38E)",

"linear-gradient(180deg,#A8D98D,#7FC96B)",

"linear-gradient(180deg,#8CCD77,#68B85A)"

];

 setTimeout(function(){

    document.getElementById("plant").textContent = "🌿";

},30000);

setTimeout(function(){

    document.getElementById("plant").textContent = "🌳";

},60000); 

const timer = setInterval(function(){

    count--;

    document.getElementById("time").textContent = count;

    let stage = Math.floor((60-count)/10);

　　document.body.style.background = colors[stage];

    if(count <= 0){

        clearInterval(timer);

        document.getElementById("time").textContent="リセット完了！";

    　　const today = new Date().toLocaleDateString("sv-SE");
　　　　console.log(today);

    }

},1000);

</script>

</body>
</html>
