<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>60秒片付けよう</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:linear-gradient(180deg,#FAF7F0,#F3E7D2);
    flex-direction:column;

    transition:background 2s linear;
}

#time{
    font-size:80px;
    font-weight:bold;
}

    #plant{

    font-size:80px;

    margin:20px;

}
    #record{
    font-size:24px;
    margin-bottom:20px;
}
    
    #streak{

    font-size:24px;

    margin-bottom:20px;

}

    #calendarButton{

    margin-top:30px;

    padding:10px 20px;

    font-size:18px;

    border:none;

    border-radius:10px;

    cursor:pointer;

}

#calendar{

    margin-top:20px;

    font-size:22px;

    text-align:center;

}
    
</style>

</head>

<body>

<h1>60秒片付けよう</h1>

<div id="record">📅 今月 0日達成</div>  

<div id="streak">🔥 0日連続</div>

<div id="plant">🌱</div>

<div id="time">60</div>

<button id="calendarButton">📊 今月の記録を見る</button>

<div id="calendar"></div>

<script>

let count = 60;

function updateRecord(){

    let records = JSON.parse(localStorage.getItem("records")) || [];

    const now = new Date();

    const year = now.getFullYear();
    const month = String(now.getMonth()+1).padStart(2,"0");

    const thisMonth = `${year}-${month}`;

    const monthlyRecords = records.filter(date => date.startsWith(thisMonth));

    document.getElementById("record").textContent =
        `📅 今月 ${monthlyRecords.length}日達成`;

}    

function updateStreak(){

    let records = JSON.parse(localStorage.getItem("records")) || [];

    records.sort();

    let streak = 0;

    let today = new Date();

    // 今日記録がなければ昨日から数え始める
    if(!records.includes(today.toLocaleDateString("sv-SE"))){
        today.setDate(today.getDate()-1);
    }

    while(true){

        const dateString = today.toLocaleDateString("sv-SE");

        if(records.includes(dateString)){

            streak++;

            today.setDate(today.getDate()-1);

        }else{

            break;

        }

    }

    document.getElementById("streak").textContent =
    `🔥 ${streak}日連続`;

}

 function showCalendar(){

    document.getElementById("calendar").innerHTML =
    "<h2>📅 2026年7月</h2>";

}   

const colors = [

"linear-gradient(180deg,#FAF7F0,#F3E7D2)",

"linear-gradient(180deg,#F8F2DF,#EADFBF)",

"linear-gradient(180deg,#EEF0D9,#DCE7BF)",

"linear-gradient(180deg,#DDEBC8,#C5DFAB)",

"linear-gradient(180deg,#C5E2B0,#A7D38E)",

"linear-gradient(180deg,#A8D98D,#7FC96B)",

"linear-gradient(180deg,#8CCD77,#68B85A)"

];

 setTimeout(function(){

    document.getElementById("plant").textContent = "🌿";

},30000);

setTimeout(function(){

    document.getElementById("plant").textContent = "🌳";

},60000); 

const timer = setInterval(function(){

    count--;

    document.getElementById("time").textContent = count;

    let stage = Math.floor((60-count)/10);

    document.body.style.background = colors[stage];

    if(count <= 0){

        clearInterval(timer);

        document.getElementById("time").textContent="片付け完了！";

       const today = new Date().toLocaleDateString("sv-SE");
　　　  
        console.log(today);

        let records = JSON.parse(localStorage.getItem("records")) || [];

　　　　if (!records.includes(today)) {
    　　records.push(today);
    　　localStorage.setItem("records", JSON.stringify(records));
}

　　　　console.log(records);

        updateRecord();

        updateStreak();
        
    }

},1000);

updateRecord();

updateStreak();

document.getElementById("calendarButton")
.addEventListener("click", showCalendar);


</script>

</body>
</html>
