<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>30秒片付けよう</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#faf7f0;
    flex-direction:column;
}

#time{
    font-size:80px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>30秒片付けよう</h1>

<div id="time">30</div>

<script>

let count = 30;

const timer = setInterval(function(){

    count--;

    document.getElementById("time").textContent = count;

    if(count <= 0){

        clearInterval(timer);

        document.getElementById("time").textContent="おしまい！";

    }

},1000);

</script>

</body>
</html>
